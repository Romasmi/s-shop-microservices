syntax = "proto3";

package notification;

option go_package = "github.com/Romasmi/s-shop-microservices/notification-service/internal/api;api";

import "google/api/annotations.proto";

service NotificationService {
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse) {
    option (google.api.http) = {
      get: "/notification-service/notifications/messages"
    };
  }
}

message Message {
  string id = 1;
  string user_id = 2;
  string order_id = 3;
  string type = 4;
  string timestamp = 5;
}

message ListMessagesRequest {
  string user_id = 1;
}

message ListMessagesResponse {
  repeated Message messages = 1;
}
