syntax = "proto3";

package user;

option go_package = "github.com/Romasmi/s-shop-microservices/user-service/internal/api;api";

import "google/protobuf/timestamp.proto";
import "user.proto";

message UserCreated {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  User user = 3;
}
