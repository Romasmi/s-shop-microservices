syntax = "proto3";

package billing;

option go_package = "github.com/Romasmi/s-shop-microservices/billing-service/pkg/api;api";

import "google/protobuf/timestamp.proto";

message UserCreated {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  message User {
    string id = 1;
    string username = 2;
    string email = 3;
  }
  User user = 3;
}

