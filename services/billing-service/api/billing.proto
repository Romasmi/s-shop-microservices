syntax = "proto3";

package billing;

option go_package = "github.com/Romasmi/s-shop-microservices/billing-service/pkg/api;api";

import "google/api/annotations.proto";

service BillingService {
  rpc GetAccount(GetAccountRequest) returns (Account) {
    option (google.api.http) = {
      get: "/billing-service/billing/accounts/{user_id}"
    };
  }
  rpc TopUp(TopUpRequest) returns (Account) {
    option (google.api.http) = {
      post: "/billing-service/billing/accounts/{user_id}/topup"
      body: "*"
    };
  }
  rpc Withdraw(WithdrawRequest) returns (WithdrawResponse) {
    option (google.api.http) = {
      post: "/billing-service/billing/accounts/{user_id}/withdraw"
      body: "*"
    };
  }
}

message Account {
  string user_id = 1;
  int64 balance = 2;
}

message GetAccountRequest {
  string user_id = 1;
}

message TopUpRequest {
  string user_id = 1;
  int64 amount = 2;
}

message WithdrawRequest {
  string user_id = 1;
  int64 amount = 2;
  string idempotency_key = 3;
}

message WithdrawResponse {
  bool success = 1;
  string reason = 2;
  Account updated_account = 3;
}
