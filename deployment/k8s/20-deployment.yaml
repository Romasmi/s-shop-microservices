apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: s-shop-system
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: app
          image: romasmi/s-shop-system:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: user-config
            - secretRef:
                name: user-secret
          ports:
            - name: web
              containerPort: 8000
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 128Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
