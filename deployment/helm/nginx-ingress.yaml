controller:
  kind: DaemonSet
  
  reportNodeInternalIp: true

  metrics:
    enabled: true
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "10254"

  hostPort:
    enabled: false

  service:
    type: LoadBalancer
    ports:
      http: 8080
      https: 8443